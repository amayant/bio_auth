name: bio_auth
description: >
  Minimal, auditable biometric authentication tool.
  Fingerprint via TEE with PIN fallback.
  Locks for 30 seconds after 3 consecutive failures.
  No biometric data ever leaves the device.
version: 0.1.0
homepage: https://github.com/starcom-dev-org/bio-auth

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8
